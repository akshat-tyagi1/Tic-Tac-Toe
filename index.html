<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="first-page">
      <div class="content">
        <div class="game-name">Tic-Tac-Toe</div>
      </div>
      <div class="info-container">
        <form action="">
          <div class="info-form">
            <div class="player">
              <label for="player1-name">Player One: </label>
              <input type="text" name="player1-name" id="player1-name" />
            </div>
            <div class="player">
              <label for="player2-name">Player Two: </label>
              <input type="text" name="player2-name" id="player2-name" />
            </div>
          </div>
        </form>
        <div class="start-game-btn">
          <button class="start-btn" type="button">Start Game</button>
        </div>
      </div>
    </div>
    <div class="main hidden">
      <div class="content">
        <div class="game-name">Tic-Tac-Toe</div>
      </div>
      <div class="players-name">
        <div class="name1"></div>
        <div class="name2"></div>
      </div>
      <div class="board"></div>
    </div>
    <dialog class="game-over">
      <p class="game-over-label">Game Over</p>
      <p class="result-text">Player One Wins</p>
      <div class="game-over-actions">
        <button class="play-again" type="button">Play Again</button>
        <button class="reset-game" type="button">Reset Game</button>
      </div>
    </dialog>
    <script src="script.js" defer></script>
  </body>
</html>
