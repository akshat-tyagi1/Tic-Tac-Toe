<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
  </head>
  <body>
    <div class="first-page hidden">
        <div class="content">
            <div class="game-name">Tic-Tac-Toe</div>
        </div>
      <div class="info-container">
        <div class="info-form">
          <div class="player">
            <label for="player1-name">Player One: </label>
            <input type="text" name="player1-name" id="player1-name" />
          </div>
          <div class="player">
            <label for="player2-name">Player Two: </label>
            <input type="text" name="player2-name" id="player2-name" />
          </div>
        </div>
        <div class="start-game-btn">
          <button class="start-btn" type="button">Start Game</button>
        </div>
      </div>
    </div>
    <script src="script.js" defer></script>
  </body>
</html>
